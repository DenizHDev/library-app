<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login|Library App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>


<div class="container">
<div class="modal modal-sheet position-static d-block bg-body-secondary p-4 py-md-5" tabindex="-1" role="dialog"
     id="modalSignin">
    <div class="modal-dialog">
        <div class="modal-content rounded-4 shadow">
            <div class="modal-header p-5 pb-4 border-bottom-0"><h1 class="fw-bold mb-0 fs-2">Log in to your account</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-5 pt-0">
                <form action="/login" method="post">
                    <div class="form-floating mb-3"><input type="text" class="form-control rounded-3"
                                                           id="floatingUsername" name="username"
                                                           placeholder="name@example.com"> <label
                            for="floatingUsername">Username</label></div>

                    <div class="form-floating mb-3"><input type="password" name="password"
                                                           class="form-control rounded-3"
                                                           id="floatingPassword" placeholder="Password"> <label
                            for="floatingPassword">Password</label></div>

                <button class="w-100 mb-2 btn btn-lg rounded-3 btn-primary" type="submit">Log in</button>

                </form>


                <hr class="my-4">


                <form action="/register" method="get">
                    <h2 class="fs-5 fw-bold mb-3 " style=" text-align: center">If you don't have an account yet, you can create one by clicking <br> ⬇️</h2>
                    <button class="w-100 py-2 mb-2 btn btn-outline-secondary rounded-3" type="submit">Register</button>
                </form>

            </div>
        </div>
    </div>
</div>


    {% for category,message in get_flashed_messages(with_categories=True)%}
    <div class="alert alert-{{ category }}">{{ message }}</div>
    {%endfor%}


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</div>


</body>
</html>
